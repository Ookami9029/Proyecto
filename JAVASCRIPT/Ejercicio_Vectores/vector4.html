<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vector</title>
    <script defer src="vector4.js"></script>
</head>
<body>
    <div>
        <h2 id="cuantos2">Cuantos 2 hay en los números</h2>
        <input type="number" id="ingreso_cuantos2" placeholder="Ingresa el primer numero">
        <br>
        <button type="button" onclick="cuantos2()">Analizar cuantos 2 hay</button>
        <br>
        <p id="resultado_cuantos2"></p>
    </div>
    <div>
        <h2 id="comienza3">Cuantos números comienzan con 3</h2>
        <input type="number" id="ingreso_comienza3" placeholder="Ingresa el primer numero">
        <br>
        <button type="button" onclick="comienza3()">Analizar cuantos comienzan 3</button>
        <br>
        <p id="resultado_comienza3"></p>
    </div>
</body>
</html>
